name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            artifact: wmc-aarch64-apple-darwin
          - target: x86_64-apple-darwin
            artifact: wmc-x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ${{ matrix.artifact }}.tar.gz wmc
          mv ${{ matrix.artifact }}.tar.gz $GITHUB_WORKSPACE/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wmc-aarch64-apple-darwin.tar.gz
            wmc-x86_64-apple-darwin.tar.gz
          generate_release_notes: true

  update-formula:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Compute SHA256s
        id: sha
        run: |
          echo "arm64=$(sha256sum wmc-aarch64-apple-darwin.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "x86_64=$(sha256sum wmc-x86_64-apple-darwin.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: Rahularya01/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        env:
          TAG: ${{ github.ref_name }}
          ARM64_SHA: ${{ steps.sha.outputs.arm64 }}
          X86_64_SHA: ${{ steps.sha.outputs.x86_64 }}
        run: |
          mkdir -p homebrew-tap/Formula
          cat > homebrew-tap/Formula/wmc.rb << EOF
          class Wmc < Formula
            desc "Clean downloaded WhatsApp media on macOS"
            homepage "https://github.com/Rahularya01/wmc"
            version "${TAG#v}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/Rahularya01/wmc/releases/download/${TAG}/wmc-aarch64-apple-darwin.tar.gz"
                sha256 "${ARM64_SHA}"
              else
                url "https://github.com/Rahularya01/wmc/releases/download/${TAG}/wmc-x86_64-apple-darwin.tar.gz"
                sha256 "${X86_64_SHA}"
              end
            end

            def install
              bin.install "wmc"
            end

            test do
              assert_match "USAGE:", shell_output("#{bin}/wmc --help")
            end
          end
          EOF

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/wmc.rb
          git commit -m "wmc ${{ github.ref_name }}"
          git push
